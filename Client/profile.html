<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Patient Profile | Rashid Dental Clinic</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Header -->

    <header>

        <div class="logo">

            <h2>Rashid Dental Clinic</h2>

        </div>

        <nav>

            <ul>

                <li><a href="patient-dashboard.html">Dashboard</a></li>

                <li><a href="appointment.html">Book Appointment</a></li>

                <li><a href="my-appointments.html">My Appointments</a></li>

                <li><a href="profile.html" class="active">Profile</a></li>

                <li><a href="home.html" class="logout-btn">Logout</a></li>

            </ul>

        </nav>

    </header>

    <!-- Profile Banner -->

    <section class="page-banner">

        <h1>My Profile</h1>

        <p>

            View and update your personal information.

        </p>

    </section>

    <!-- Profile Section -->

    <section class="profile-section">

        <div class="profile-container">

            <div class="profile-image">

                <img src="../images/patient.png" alt="Patient Profile">

                <h2 id="profileName">Muhammad Azan</h2>

                <p id="profileRole">Patient</p>

            </div>

            <div class="profile-form">

                <form action="#">

                    <div class="form-group">

                        <label for="fullname">Full Name</label>

                        <input
                            type="text"
                            id="fullname"
                            value="Muhammad Azan">

                    </div>

                    <div class="form-group">

                        <label for="email">Email Address</label>

                        <input
                            type="email"
                            id="email"
                            value="azan@example.com">

                    </div>

                    <div class="form-group">

                        <label for="phone">Phone Number</label>

                        <input
                            type="tel"
                            id="phone"
                            value="03001234567">

                    </div>

                    <div class="form-group">

                        <label for="dob">Date of Birth</label>

                        <input
                            type="date"
                            id="dob">

                    </div>

                    <div class="form-group">

                        <label for="gender">Gender</label>

                        <select id="gender">

                            <option>Male</option>

                            <option>Female</option>

                            <option>Other</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label for="address">Address</label>

                        <textarea
                            id="address"
                            rows="4">Karachi, Pakistan</textarea>

                    </div>

                    <div class="form-group">

                        <label for="newpassword">New Password</label>

                        <input
                            type="password"
                            id="newpassword"
                            placeholder="Enter new password">

                    </div>

                    <div class="form-group">

                        <label for="confirmpassword">Confirm Password</label>

                        <input
                            type="password"
                            id="confirmpassword"
                            placeholder="Confirm new password">

                    </div>

                <div class="form-group profile-btn">

    <button type="submit" class="btn">

        Update Profile

    </button>

</div>

                </form>

            </div>

        </div>

    </section>

    <div class="profile-image">

    <img src="../images/patient.png" alt="Patient Profile">

    <h2>Muhammad Azan</h2>

    <p class="patient-role">Patient</p>

</div>

    <!-- Footer -->

    <footer>

        <p>

            &copy; 2026 Rashid Dental Clinic. All Rights Reserved.

        </p>

    </footer>

    <script src="../js/script.js"></script>

</body>

</html>
